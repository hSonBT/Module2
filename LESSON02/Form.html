<!-- default GET -->
<form method="POST">

    <!-- Emmet: div>label[for="username"]{UserName:}+input[type="text"]#username[name="username"] -->
    <div>
        <label for="username">UserName:</label>
        <input type="text" id="username" name="username">
    </div>


    <!-- Emmet: div>label[for="password"]{Password:}+input[type="password"]#password[name="password"] -->
    <div>
        <label for="password">Password:</label>
        <input type="password" name="password" id="password">
    </div>

    <!-- Emmet: div>label[for="email"]{Your Email:}+input[type="email"]#email -->
    <div>
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email">
    </div>

    <!-- Emmet: div>label[for="score"]{Score:}+input[type="number"]#score[name="score"][min="0"][max="10"][step="0.1"] -->
    <div>
        <label for="score">Score:</label>
        <input type="number" id="score" name="score" min="0" max="10" step="0.1">
    </div>

    <!-- Emmet: div>label[for="dob"]{Date of Birth}+input[type="date"]#dob[name="dob"] -->
    <div>
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob">
    </div>

    <!-- Emmet: div>label[for="start"]{Start:}+input[type="time"]#start[name="start"] -->
    <div>
        <label for="start">Start</label>
        <input type="time" id="start" name="start">
    </div>

    <!-- Emmet:   div>label[type="range"]{Range:}+input[type="range"]#range[name="range"] -->
    <div>
        <label for="range">Range:</label>
        <input type="range" id="range" name="range">
    </div>

    <!-- Emmet: div>label[for="url"]{URL:}+input[type="url"]#url[name="url"] -->
    <div>
        <label for="url">URL:</label>
        <input type="url" id="url" name="url">
    </div>

    <!-- Emmet: div>label[for="gender"]{Gender:}+select[name="gender"]#gender>option[value="0"]{Male}+option[value="1"]{Female} -->
    <div>
        <label for="gender">Gender:</label>
        <select name="gender" id="gender">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>
    </div>


    <!-- Emmet: div>label[for="languages"]{Languages:}+select[name="languages"]#languages[multiple][name="languages"]#languages>option[value="0"]{Englist}+option[value="1"]{French}+option[value="2"]{German} -->
    <div>
        <label for="languages">Languages:</label>
        <select name="languages" id="languages" multiple="multiple">
            <option value="0">Englist</option>
            <option value="1">French</option>
            <option value="2">German</option>
        </select>
    </div>


    <!-- Emmet: div>label[for="note"]{Note:}+textarea[name="note"]#note -->
    <div>
        <label for="note">Note:</label>
        <textarea name="note" id="note"></textarea>
    </div>


    <div>
        <!-- HTML5 -->
        <button>Submit</button>
        <button type="button">Button</button>
        <button type="reset">Reset</button>

        <!-- HTML old -->
        <input type="submit" value="Submit">
        <input type="button" value="Button">
        <input type="reset" value="Reset">
    </div>
</form>
